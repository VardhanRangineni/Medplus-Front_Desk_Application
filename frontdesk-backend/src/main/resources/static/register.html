<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MedPlus — Visitor Self-Registration</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #f4f5f7; min-height: 100vh; color: #111; }

    .top-bar { background: #C2181D; color: #fff; padding: 14px 20px; display: flex; align-items: center; gap: 10px; }
    .top-bar__logo { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
    .top-bar__sub  { font-size: 13px; opacity: 0.85; }

    .card { max-width: 480px; margin: 28px auto; background: #fff; border-radius: 16px; box-shadow: 0 2px 16px rgba(0,0,0,0.09); overflow: hidden; }
    .card__header { padding: 22px 24px 16px; border-bottom: 1px solid #f0f1f3; }
    .card__title  { font-size: 17px; font-weight: 700; color: #111; }
    .card__sub    { font-size: 13px; color: #777; margin-top: 3px; }
    .card__body   { padding: 20px 24px 24px; }

    /* Type selector */
    .type-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
    .type-btn { border: 2px solid #e5e7eb; border-radius: 12px; padding: 14px 10px; background: #fff; cursor: pointer; text-align: center; transition: border-color 0.18s, background 0.18s; }
    .type-btn:hover { border-color: #C2181D; background: rgba(194,24,29,0.03); }
    .type-btn.active { border-color: #C2181D; background: rgba(194,24,29,0.06); }
    .type-btn__icon  { font-size: 28px; margin-bottom: 6px; }
    .type-btn__label { font-size: 13.5px; font-weight: 600; color: #333; }

    /* Fields */
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 12.5px; font-weight: 600; color: #444; margin-bottom: 6px; }
    .field label .req { color: #C2181D; margin-left: 3px; }
    .field input, .field textarea {
      width: 100%; padding: 10px 13px; border: 1.5px solid #dde0e5; border-radius: 9px;
      font-size: 14px; font-family: inherit; color: #111; background: #fff; transition: border-color 0.15s; outline: none;
    }
    .field input:focus, .field textarea:focus { border-color: #C2181D; box-shadow: 0 0 0 3px rgba(194,24,29,0.10); }
    .field textarea { resize: vertical; min-height: 72px; }
    .field input.mono { font-family: 'Courier New', monospace; font-size: 15px; letter-spacing: 2px; }
    .field .hint      { font-size: 11.5px; color: #9ca3af; margin-top: 4px; line-height: 1.4; }
    .field .field-err { font-size: 12px; color: #C2181D; margin-top: 4px; display: none; }

    /* Submit */
    .submit-btn { width: 100%; padding: 13px; background: #C2181D; color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 4px; transition: background 0.18s; }
    .submit-btn:hover:not(:disabled) { background: #a81317; }
    .submit-btn:disabled { background: #ccc; cursor: not-allowed; }

    /* Messages */
    .msg-error   { background: rgba(194,24,29,0.08); border: 1px solid rgba(194,24,29,0.25); color: #C2181D; border-radius: 8px; padding: 10px 14px; font-size: 13.5px; margin-bottom: 14px; }
    .msg-loading { text-align: center; color: #888; font-size: 14px; padding: 30px 0; }

    /* Success */
    .success-wrap  { text-align: center; padding: 10px 4px 4px; }
    .success-icon  { font-size: 44px; margin-bottom: 10px; }
    .success-title { font-size: 18px; font-weight: 800; color: #111; margin-bottom: 6px; }
    .success-sub   { font-size: 13.5px; color: #666; margin-bottom: 22px; line-height: 1.5; }
    #qrcode-container { display: flex; justify-content: center; margin: 0 auto 18px; }
    #qrcode-container canvas, #qrcode-container img { border-radius: 8px; }
    .qr-hint       { font-size: 12.5px; color: #888; margin-top: 6px; }
    .token-display { background: #f4f5f7; border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #555; word-break: break-all; margin-top: 12px; }
    .token-display strong { color: #333; font-family: monospace; font-size: 12px; }

    @media (max-width: 520px) { .card { margin: 0; border-radius: 0; min-height: 100vh; } }
  </style>
</head>
<body>

<div class="top-bar">
  <div>
    <div class="top-bar__logo">MedPlus</div>
    <div class="top-bar__sub">Visitor Self-Registration</div>
  </div>
</div>

<div class="card">
  <div class="card__header">
    <div class="card__title">Register Your Visit</div>
    <div class="card__sub" id="location-name">Loading…</div>
  </div>
  <div class="card__body" id="main-body">
    <div class="msg-loading">⏳ Loading…</div>
  </div>
</div>

<script>
  const BASE = window.location.origin;
  const params = new URLSearchParams(window.location.search);
  const groupToken = params.get('t') || params.get('token') || '';

  let locationName = '';
  let selectedType = 'VISITOR';

  async function init() {
    if (!groupToken) { showError('Invalid or missing registration link. Please ask the front desk for a new link.'); return; }
    try {
      const res  = await fetch(`${BASE}/api/pre-register/public/form-data/${groupToken}`);
      const json = await res.json();
      if (!json.success) throw new Error(json.message || 'Failed to load form.');
      locationName = json.data.locationName;
      document.getElementById('location-name').textContent = 'at ' + locationName + ' — fill in your details below';
      renderForm();
    } catch (e) {
      showError(e.message || 'Could not load registration form. Please check your link or try again.');
    }
  }

  function showError(msg) {
    document.getElementById('location-name').textContent = 'Registration';
    document.getElementById('main-body').innerHTML = `<div class="msg-error">${esc(msg)}</div>`;
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function renderForm() {
    document.getElementById('main-body').innerHTML = `
      <div class="type-selector">
        <button class="type-btn active" id="btn-visitor"  onclick="selectType('VISITOR')">
          <div class="type-btn__icon">🧑</div><div class="type-btn__label">Visitor</div>
        </button>
        <button class="type-btn" id="btn-employee" onclick="selectType('EMPLOYEE')">
          <div class="type-btn__icon">👔</div><div class="type-btn__label">Employee</div>
        </button>
      </div>

      <div id="error-msg" class="msg-error" style="display:none"></div>

      <!-- Visitor: mobile -->
      <div class="field" id="field-mobile">
        <label>Mobile Number <span class="req">*</span></label>
        <input id="f-mobile" type="tel" inputmode="numeric" placeholder="10-digit mobile number" maxlength="10" />
      </div>

      <!-- Employee: emp ID -->
      <div class="field" id="field-empid" style="display:none">
        <label>Employee ID <span class="req">*</span></label>
        <input id="f-empid" type="text" placeholder="e.g. EMP1001" />
        <div class="hint">Your employee ID will be verified at the front desk</div>
      </div>

      <!-- Full name (visitor only) -->
      <div class="field" id="field-name">
        <label>Full Name <span class="req">*</span></label>
        <input id="f-name" type="text" placeholder="Your full name" />
      </div>

      <!-- Aadhaar (visitor only) -->
      <div class="field" id="field-aadhaar">
        <label>Aadhaar Number <span class="req">*</span></label>
        <input id="f-aadhaar" type="text" inputmode="numeric" placeholder="XXXX XXXX XXXX" maxlength="14" class="mono" oninput="fmtAadhaar(this)" />
        <div class="hint">Your 12-digit Aadhaar UID — used for identity verification at entry</div>
        <div class="field-err" id="aadhaar-err">Please enter a valid 12-digit Aadhaar number.</div>
      </div>

      <!-- Email (visitor only) -->
      <div class="field" id="field-email">
        <label>Email <span style="font-weight:400;color:#9ca3af">(optional)</span></label>
        <input id="f-email" type="email" placeholder="your@email.com" />
      </div>

      <!-- Person to meet — free text -->
      <div class="field">
        <label>Person to Meet <span class="req">*</span></label>
        <input id="f-ptm" type="text" placeholder="Name of the person you are visiting" />
        <div class="hint">Enter the name of the employee you wish to meet</div>
      </div>

      <!-- Department — free text (optional) -->
      <div class="field">
        <label>Department <span style="font-weight:400;color:#9ca3af">(optional)</span></label>
        <input id="f-dept" type="text" placeholder="e.g. Operations, Finance…" />
      </div>

      <!-- Reason -->
      <div class="field">
        <label>Reason for Visit <span style="font-weight:400;color:#9ca3af">(optional)</span></label>
        <textarea id="f-reason" placeholder="e.g. Scheduled meeting, delivery, etc."></textarea>
      </div>

      <button class="submit-btn" id="submit-btn" onclick="handleSubmit()">
        Submit &amp; Get QR Code
      </button>
    `;
  }

  function selectType(type) {
    selectedType = type;
    document.getElementById('btn-visitor').classList.toggle('active',  type === 'VISITOR');
    document.getElementById('btn-employee').classList.toggle('active', type === 'EMPLOYEE');
    const errEl = document.getElementById('error-msg');
    if (errEl) errEl.style.display = 'none';
    const aadhaarErr = document.getElementById('aadhaar-err');
    if (aadhaarErr) aadhaarErr.style.display = 'none';

    const isVisitor = type === 'VISITOR';
    document.getElementById('field-mobile').style.display  = isVisitor ? '' : 'none';
    document.getElementById('field-empid').style.display   = isVisitor ? 'none' : '';
    document.getElementById('field-aadhaar').style.display = isVisitor ? '' : 'none';
    document.getElementById('field-name').style.display    = isVisitor ? '' : 'none';
    document.getElementById('field-email').style.display   = isVisitor ? '' : 'none';
  }

  function fmtAadhaar(input) {
    const d = input.value.replace(/\D/g, '').slice(0, 12);
    input.value = d.replace(/(\d{4})(\d{0,4})(\d{0,4})/, (_, a, b, c) => [a, b, c].filter(Boolean).join(' '));
  }

  async function handleSubmit() {
    const errEl = document.getElementById('error-msg');
    errEl.style.display = 'none';
    document.getElementById('aadhaar-err').style.display = 'none';

    const isVisitor = selectedType === 'VISITOR';
    const name    = isVisitor ? (document.getElementById('f-name')?.value   || '').trim() : null;
    const mobile  = isVisitor ? (document.getElementById('f-mobile')?.value || '').replace(/\D/g, '') : null;
    const empId   = !isVisitor? (document.getElementById('f-empid')?.value  || '').trim() : null;
    const aadhaar = isVisitor ? (document.getElementById('f-aadhaar')?.value|| '').replace(/\D/g, '') : null;
    const email   = isVisitor ? (document.getElementById('f-email')?.value  || '').trim() : null;
    const ptm     = (document.getElementById('f-ptm')?.value    || '').trim();
    const dept    = (document.getElementById('f-dept')?.value   || '').trim();
    const reason  = (document.getElementById('f-reason')?.value || '').trim();

    if (isVisitor && !name)              { showFieldErr('Please enter your full name.'); return; }
    if (isVisitor && mobile.length < 10) { showFieldErr('Please enter a valid 10-digit mobile number.'); return; }
    if (!isVisitor && !empId)            { showFieldErr('Please enter your Employee ID.'); return; }
    if (isVisitor && aadhaar.length !== 12) {
      document.getElementById('aadhaar-err').style.display = '';
      document.getElementById('f-aadhaar').focus();
      return;
    }
    if (!ptm) { showFieldErr('Please enter the name of the person you want to meet.'); return; }

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'Submitting…';

    try {
      const payload = {
        entryType:      selectedType,
        name:           isVisitor ? name  : null,
        mobile:         isVisitor ? mobile: null,
        empId:          !isVisitor? empId : null,
        govtIdType:     isVisitor ? 'AADHAAR' : null,
        govtIdNumber:   isVisitor ? aadhaar   : null,
        email:          isVisitor ? (email || null) : null,
        personName:   ptm,
        hostDepartment: dept   || null,
        reasonForVisit: reason || null,
      };

      const res  = await fetch(`${BASE}/api/pre-register/public/submit/${groupToken}`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload),
      });
      const json = await res.json();
      if (!json.success) throw new Error(json.message || 'Submission failed.');
      showSuccess(json.data);
    } catch (e) {
      btn.disabled = false;
      btn.textContent = 'Submit & Get QR Code';
      showFieldErr(e.message || 'Submission failed. Please try again.');
    }
  }

  function showFieldErr(msg) {
    const el = document.getElementById('error-msg');
    if (el) { el.textContent = msg; el.style.display = ''; }
  }

  function showSuccess(data) {
    document.getElementById('location-name').textContent = 'Registration Confirmed — ' + data.locationName;
    document.getElementById('main-body').innerHTML = `
      <div class="success-wrap">
        <div class="success-icon">✅</div>
        <div class="success-title">You're Registered!</div>
        <div class="success-sub">
          Hi <strong>${esc(data.name)}</strong>, your registration is confirmed.<br/>
          Show this QR code at the front desk to check in instantly.
        </div>
        <div id="qrcode-container"></div>
        <div class="qr-hint">Screenshot this QR code — you'll need it at the front desk.</div>
        <div class="token-display">Reference: <strong>${esc(data.token)}</strong></div>
      </div>`;
    new QRCode(document.getElementById('qrcode-container'), {
      text: 'PREREG:' + data.token, width: 220, height: 220,
      colorDark: '#111111', colorLight: '#ffffff', correctLevel: QRCode.CorrectLevel.M,
    });
  }

  init();
</script>
</body>
</html>
