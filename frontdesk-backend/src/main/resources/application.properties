spring.application.name=frontdesk-backend

# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080

# ── MySQL DataSource ──────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/frontdesk?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=UTF-8&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP Connection Pool
spring.datasource.hikari.pool-name=FrontDeskPool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000

# ── JWT ───────────────────────────────────────────────────────────────────────
# Secret must be >= 32 characters for HS256
jwt.secret=medplus-frontdesk-secure-jwt-secret-key-hyderabad-2024
# Token validity: 24 hours in milliseconds
jwt.expiration=86400000
jwt.token-type=Bearer

# ── SQL Initialization ────────────────────────────────────────────────────────
# always = run schema.sql on every startup (CREATE TABLE IF NOT EXISTS is safe)
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:db/schema-init.sql

# ── External HR/ERP API ───────────────────────────────────────────────────────
external.api.base-url=https://api.medplus-erp.internal
external.api.key=dummy-api-key-12345
external.api.employees-path=/api/v1/employees
external.api.locations-path=/api/v1/locations
external.api.connect-timeout-ms=5000
external.api.read-timeout-ms=10000

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.medplus=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.springframework.jdbc=DEBUG
