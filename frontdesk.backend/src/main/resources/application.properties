spring.application.name=frontdesk.backend
spring.datasource.url=jdbc:mysql://localhost:3306/frontdesk?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.sql.init.mode=always

# HikariCP — enough connections for parallel queries in CompletableFuture tasks
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.application.version=1.0.0
server.port=8080

# Multipart — allow uploads up to 20 MB
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

